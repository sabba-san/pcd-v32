<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Create Account | DLP Advisor</title>
<!-- Google Fonts: Manrope & Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "error-container": "#ffdad6",
                    "on-tertiary": "#ffffff",
                    "outline-variant": "#c3c6d7",
                    "tertiary-container": "#bc4800",
                    "surface-variant": "#e0e3e5",
                    "inverse-on-surface": "#eff1f3",
                    "on-secondary": "#ffffff",
                    "outline": "#737686",
                    "inverse-surface": "#2d3133",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-low": "#f2f4f6",
                    "surface-dim": "#d8dadc",
                    "primary": "#004ac6",
                    "on-secondary-fixed": "#00174b",
                    "on-secondary-fixed-variant": "#31447b",
                    "on-primary-fixed-variant": "#003ea8",
                    "on-primary-fixed": "#00174b",
                    "surface-container": "#eceef0",
                    "surface": "#f7f9fb",
                    "inverse-primary": "#b4c5ff",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "error": "#ba1a1a",
                    "on-primary-container": "#eeefff",
                    "on-surface-variant": "#434655",
                    "background": "#f7f9fb",
                    "on-tertiary-fixed": "#360f00",
                    "on-background": "#191c1e",
                    "tertiary-fixed-dim": "#ffb596",
                    "surface-container-lowest": "#ffffff",
                    "surface-tint": "#0053db",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#dbe1ff",
                    "secondary-fixed": "#dbe1ff",
                    "tertiary-fixed": "#ffdbcd",
                    "secondary": "#495c95",
                    "on-error": "#ffffff",
                    "tertiary": "#943700",
                    "secondary-container": "#acbfff",
                    "surface-container-highest": "#e0e3e5",
                    "surface-bright": "#f7f9fb",
                    "on-tertiary-container": "#ffede6",
                    "on-surface": "#191c1e",
                    "secondary-fixed-dim": "#b4c5ff",
                    "primary-container": "#2563eb",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-secondary-container": "#394c84",
                    "on-primary": "#ffffff"
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
                },
                fontFamily: {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
                }
            },
        },
    }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[#f7f9fb] flex justify-between items-center w-full px-6 py-4 max-w-7xl mx-auto">
        <div class="text-xl font-bold text-[#004ac6] font-headline tracking-tight">DLP Advisor</div>
        <div class="hidden md:flex gap-6 items-center">
            <span class="text-[#434655] text-sm font-medium">Need help?</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center px-4 py-12">
        <div class="bg-surface-container-lowest w-full max-w-2xl rounded-xl p-8 md:p-12 transition-all duration-300" style="box-shadow: 0 40px 64px -12px rgba(25, 28, 30, 0.04);">

            <!-- Branding Icon -->
            <div class="flex justify-center mb-8">
                <div class="bg-primary w-14 h-14 rounded-lg flex items-center justify-center text-white shadow-lg shadow-primary/20">
                    <span class="material-symbols-outlined text-3xl">apartment</span>
                </div>
            </div>

            <!-- Header Text -->
            <div class="text-center mb-10">
                <h1 class="font-headline text-3xl md:text-4xl font-extrabold text-on-surface tracking-tight mb-2">Create Account</h1>
                <p class="text-on-surface-variant font-medium text-lg">Select your role to get started.</p>
            </div>

            <!-- Role Grid -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">

                <!-- Homeowner Card -->
                <a href="{{ url_for('auth.reg_homeowner') }}" class="group flex flex-col items-center justify-center p-6 rounded-xl border border-transparent bg-surface-container-low hover:bg-surface-container-lowest hover:border-primary/30 transition-all duration-200">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-primary mb-4 group-hover:bg-primary group-hover:text-white transition-colors duration-200">
                        <span class="material-symbols-outlined text-2xl">home</span>
                    </div>
                    <span class="font-headline font-bold text-on-surface">Homeowner</span>
                </a>


                <!-- Housing Developer Card -->
                <a href="{{ url_for('auth.reg_housedeveloper') }}" class="group flex flex-col items-center justify-center p-6 rounded-xl border border-transparent bg-surface-container-low hover:bg-surface-container-lowest hover:border-primary/30 transition-all duration-200">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-primary mb-4 group-hover:bg-primary group-hover:text-white transition-colors duration-200">
                        <span class="material-symbols-outlined text-2xl">construction</span>
                    </div>
                    <span class="font-headline font-bold text-on-surface text-center">Housing Developer</span>
                </a>


                <!-- Lawyer Card -->
                <a href="{{ url_for('auth.reg_lawyer') }}" class="group flex flex-col items-center justify-center p-6 rounded-xl border border-transparent bg-surface-container-low hover:bg-surface-container-lowest hover:border-primary/30 transition-all duration-200">
                    <div class="w-12 h-12 rounded-full flex items-center justify-center bg-surface-container-highest text-primary mb-4 group-hover:bg-primary group-hover:text-white transition-colors duration-200">
                        <span class="material-symbols-outlined text-2xl">gavel</span>
                    </div>
                    <span class="font-headline font-bold text-on-surface">Lawyer</span>
                </a>


            </div>

            <!-- Footer Action -->
            <div class="text-center pt-4">
                <p class="text-on-surface-variant text-sm">
                    Already have an account?
                    <a class="text-primary font-bold hover:underline transition-all" href="{{ url_for('auth.login') }}">Login</a>
                </p>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full flex flex-col md:flex-row justify-between items-center px-8 py-8 bg-[#f7f9fb]">
        <div class="text-lg font-bold text-[#004ac6] mb-4 md:mb-0">DLP Advisor</div>
        <div class="flex flex-col md:flex-row gap-6 items-center">
            <div class="flex gap-4">
                <a class="text-[#434655] text-sm font-normal hover:text-[#004ac6] transition-colors" href="#">Privacy Policy</a>
                <a class="text-[#434655] text-sm font-normal hover:text-[#004ac6] transition-colors" href="#">Terms of Service</a>
                <a class="text-[#434655] text-sm font-normal hover:text-[#004ac6] transition-colors" href="#">Contact Support</a>
            </div>
            <p class="text-[#434655] text-sm font-normal opacity-80 mt-4 md:mt-0">&copy; 2025 DLP Advisor. All rights reserved.</p>
        </div>
    </footer>

    <!-- Background Decorative Elements -->
    <div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
        <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[120px]"></div>
        <div class="absolute -bottom-[10%] -right-[10%] w-[30%] h-[30%] rounded-full bg-secondary-container/10 blur-[100px]"></div>
    </div>

</body>
</html>
